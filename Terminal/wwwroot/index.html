<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>KSK Postamat - Панель отладки</title>
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: #e0e0e0;
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            height: 95vh;
        }

        /* Верхний ряд: Логирование и Статус */
        .top-row {
            display: flex;
            gap: 20px;
            margin-bottom: 20px;
            height: 180px;
        }

        .info-box {
            background: white;
            border: 3px solid #333;
            padding: 10px;
            display: flex;
            flex-direction: column;
        }

        #log-area {
            flex: 2;
        }

        #logs {
            flex-grow: 1;
            overflow-y: auto;
            background: #f9f9f9;
            border: 1px solid #ccc;
            font-family: monospace;
            font-size: 12px;
            padding: 5px;
            margin-top: 5px;
        }

        #status-area {
            flex: 1;
        }

        /* Сетка ячеек (два блока) */
        .locker-wrapper {
            display: flex;
            justify-content: space-between;
            gap: 20px;
            margin-bottom: 20px;
        }

        .grid-container {
            flex: 1;
            display: grid;
            grid-template-columns: repeat(6, 1fr);
            grid-template-rows: repeat(3, 60px);
            gap: 8px;
            background: #fff;
            border: 3px solid #333;
            padding: 10px;
        }

        .cell {
            border: 2px solid #000;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            font-size: 16px;
            cursor: pointer;
            transition: transform 0.1s;
        }

            .cell:active {
                transform: scale(0.95);
            }

            .cell.closed {
                background-color: #ff4d4d; /* Красный */
                color: white;
                text-shadow: 1px 1px 1px black;
            }

            .cell.open {
                background-color: #4dff4d; /* Зеленый */
                color: black;
            }

        /* Нижняя панель управления */
        .controls {
            background: white;
            border: 3px solid #333;
            padding: 30px;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 15px;
        }

        input {
            padding: 12px;
            font-size: 18px;
            width: 250px;
            border: 2px solid #333;
        }

        button {
            padding: 12px 25px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            background: #333;
            color: white;
            border: none;
            border-radius: 4px;
        }

            button:hover {
                background: #555;
            }

            button:active {
                background: #000;
            }
    </style>
</head>
<body>

    <div class="top-row">
        <div id="log-area" class="info-box">
            <strong>Логирование:</strong>
            <div id="logs"></div>
        </div>
        <div id="status-area" class="info-box">
            <strong>Статус системы:</strong>
            <p>Контроллер: <span id="ctrl-status" style="color: green; font-weight: bold;">OK</span></p>
            <p>1С (Mock): <span id="one-c-status" style="color: blue; font-weight: bold;">Подключено</span></p>
            <p style="font-size: 11px; color: #666;">* Нажмите на ячейку, чтобы открыть/закрыть вручную</p>
        </div>
    </div>

    <div class="locker-wrapper">
        <div id="grid-left" class="grid-container">
            <!-- Ячейки 1-18 -->
        </div>
        <div id="grid-right" class="grid-container">
            <!-- Ячейки 19-36 -->
        </div>
    </div>

    <div class="controls">
        <input type="text" id="orderIdInput" placeholder="Введите номер заказа...">
        <button onclick="processPayment()">Оплатить и открыть</button>
        <button onclick="loadCells()" style="background: #777;">Обновить сетку</button>
    </div>

    <script>
        const API_URL = "http://localhost:5018/api";

        function addLog(message) {
            const time = new Date().toLocaleTimeString();
            $('#logs').prepend(`<div>[${time}] ${message}</div>`);
        }

        // Загрузка состояния ячеек
        function loadCells() {
            $.get(`${API_URL}/cells`, function (data) {
                const left = $('#grid-left').empty();
                const right = $('#grid-right').empty();

                if (!data || data.length === 0) {
                    addLog("Внимание: Список ячеек пуст!");
                    return;
                }

                data.forEach(cell => {
                    const statusClass = cell.isClosed ? 'closed' : 'open';
                    const cellHtml = `
                            <div class="cell ${statusClass}" onclick="toggleCell(${cell.cellId}, ${cell.isClosed})">
                                ${cell.cellId}
                            </div>
                        `;

                    // Распределяем по блокам как на схеме (18 слева, 18 справа)
                    if (cell.cellId <= 18) {
                        left.append(cellHtml);
                    } else {
                        right.append(cellHtml);
                    }
                });
                addLog("Сетка ячеек обновлена");
            }).fail(function () {
                addLog("ОШИБКА: Сервер Backend недоступен!");
            });
        }

        // Переключение статуса ячейки (Отладка)
        function toggleCell(id, currentIsClosed) {
            const action = currentIsClosed ? 'open' : 'close';
            $.post(`${API_URL}/cells/${action}/${id}`, function () {
                addLog(`Ручное управление: Ячейка ${id} -> ${action.toUpperCase()}`);
                loadCells(); // Перерисовываем сетку
            });
        }

        // Логика оплаты
        function processPayment() {
            const orderId = $('#orderIdInput').val();

            if (!orderId) {
                addLog("Ошибка: Введите номер заказа!");
                return;
            }

            addLog(`Запрос оплаты для заказа: ${orderId}...`);

            $.post(`${API_URL}/process-payment?orderId=${orderId}`, function (res) {
                addLog(res.message);
                loadCells(); // Обновляем, чтобы увидеть открытую ячейку
                $('#orderIdInput').val(''); // Очищаем поле
            }).fail(err => {
                const msg = err.responseJSON ? err.responseJSON.message : "Заказ не найден";
                addLog(`Ошибка: ${msg}`);
            });
        }

        // Запуск при загрузке
        $(document).ready(function () {
            loadCells();
            // Автообновление каждые 10 секунд
            setInterval(loadCells, 10000);
        });
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>KSK Postamat Terminal</title>
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <style>
        :root {
            --bg-color: #f0f3f6;
            --panel-bg: #ffffff;
            --primary-blue: #1a3a5a;
            --status-green: #27ae60;
            --status-red: #e74c3c;
            --border-color: #cbd5e0;
        }

        body {
            font-family: 'Segoe UI', sans-serif;
            background: var(--bg-color);
            margin: 0;
            padding: 0;
            width: 1024px;
            height: 768px;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        header {
            background: var(--primary-blue);
            color: white;
            padding: 12px 25px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            box-shadow: 0 2px 5px rgba(0,0,0,0.2);
        }

        /* ПАНЕЛИ СВЕРХУ */
        .dashboard {
            display: grid;
            grid-template-columns: 2fr 1fr;
            gap: 20px;
            padding: 15px 20px;
            height: 160px;
        }

        .info-box {
            background: var(--panel-bg);
            border-radius: 6px;
            border: 1px solid var(--border-color);
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        .box-header {
            background: #eee;
            padding: 4px 10px;
            font-size: 11px;
            font-weight: bold;
            color: #555;
            border-bottom: 1px solid var(--border-color);
        }

        #logs {
            flex: 1;
            overflow-y: auto;
            padding: 8px;
            font-family: 'Consolas', monospace;
            font-size: 11px;
            background: #2c3e50;
            color: #ecf0f1;
        }

        /* ИНФО О ЗАКАЗЕ */
        .order-details {
            padding: 10px;
            font-size: 13px;
        }

            .order-details p {
                margin: 4px 0;
                border-bottom: 1px solid #f0f0f0;
            }

            .order-details b {
                color: var(--primary-blue);
            }

        /* СЕТКА ЯЧЕЕК */
        .locker-area {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            padding: 0 20px;
            flex: 1;
            margin-bottom: 85px;
        }

        .grid-container {
            display: grid;
            grid-template-columns: repeat(12, 1fr);
            grid-template-rows: 70px 70px 95px 140px;
            gap: 10px;
            background: #e2e8f0;
            padding: 12px;
            border-radius: 8px;
            border: 1px solid var(--border-color);
        }

        .cell {
            background: white;
            border: 1px solid #a0aec0;
            border-radius: 4px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            cursor: pointer;
            transition: 0.1s;
        }

            .cell.small {
                grid-column: span 2;
            }

            .cell.medium {
                grid-column: span 3;
            }

            .cell.large {
                grid-column: span 6;
            }

            .cell.closed {
                border-left: 6px solid var(--status-red);
                color: #2d3748;
            }

            .cell.open {
                border-left: 6px solid var(--status-green);
                color: var(--status-green);
                background: #f0fff4;
            }

            .cell:hover {
                transform: scale(1.02);
                z-index: 5;
                box-shadow: 0 4px 10px rgba(0,0,0,0.1);
            }

        /* НИЖНЯЯ ПАНЕЛЬ */
        .footer-controls {
            position: absolute;
            bottom: 0;
            width: 100%;
            height: 80px;
            background: white;
            border-top: 1px solid var(--border-color);
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 15px;
        }

        input {
            padding: 12px;
            width: 250px;
            border: 1px solid var(--border-color);
            border-radius: 4px;
            font-size: 16px;
            outline: none;
        }

        button {
            padding: 12px 25px;
            font-weight: bold;
            cursor: pointer;
            border: none;
            border-radius: 4px;
            text-transform: uppercase;
        }

        .btn-find {
            background: var(--primary-blue);
            color: white;
        }

        .btn-pay {
            background: var(--status-green);
            color: white;
        }

        button:active {
            transform: scale(0.95);
        }

        .copyright {
            position: absolute;
            bottom: 10px;
            left: 15px;
            font-size: 11px;
            color: #a0aec0;
        }
    </style>
</head>
<body>

    <header>
        <div style="font-weight: bold; letter-spacing: 0.5px;">KSK POSTAMAT SYSTEM</div>
        <div id="one-c-status">КОНТРОЛЛЕР: <span style="color:#2ecc71">ONLINE</span></div>
    </header>

    <div class="dashboard">
        <div class="info-box">
            <div class="box-header">ЖУРНАЛ СОБЫТИЙ</div>
            <div id="logs"></div>
        </div>
        <div class="info-box">
            <div class="box-header">ДАННЫЕ НАЙДЕННОГО ЗАКАЗА</div>
            <div id="order-info-display" class="order-details">
                <p style="color:#999; text-align:center; margin-top:15px;">Введите номер заказа и нажмите "Найти"</p>
            </div>
        </div>
    </div>

    <div class="locker-area">
        <div id="grid-left" class="grid-container"></div>
        <div id="grid-right" class="grid-container"></div>
    </div>

    <div class="footer-controls">
        <input type="text" id="orderIdInput" placeholder="Номер заказа...">
        <button class="btn-find" onclick="findOrder()">Найти заказ</button>
        <button class="btn-pay" onclick="payOrder()">Оплатить заказ</button>
    </div>

    <div class="copyright">ЧТУП "Руд Буд" 2026</div>

    <script>
        const API_URL = "http://localhost:5018/api";
        let currentOrder = null; // Здесь храним найденный заказ

        function addLog(message) {
            const time = new Date().toLocaleTimeString();
            const logElement = $('#logs');
            logElement.append(`<div>[${time}] ${message}</div>`);
            logElement.scrollTop(logElement[0].scrollHeight);
        }

        // 1. ЗАГРУЗКА ЯЧЕЕК (КЛИКИ ВОССТАНОВЛЕНЫ)
        function loadCells() {
            $.get(`${API_URL}/cells`, function (data) {
                const left = $('#grid-left').empty();
                const right = $('#grid-right').empty();

                data.forEach((cell) => {
                    const pos = (cell.cellId <= 18) ? cell.cellId : cell.cellId - 18;

                    let sizeClass = "small";
                    if (pos >= 13 && pos <= 16) sizeClass = "medium";
                    if (pos >= 17 && pos <= 18) sizeClass = "large";

                    const statusClass = cell.isClosed ? 'closed' : 'open';

                    // ДОБАВЛЕН ONCLICK ДЛЯ РУЧНОГО УПРАВЛЕНИЯ
                    const cellHtml = `
                            <div class="cell ${sizeClass} ${statusClass}"
                                 onclick="toggleCell(${cell.cellId}, ${cell.isClosed})">
                                ${cell.cellId}
                            </div>`;

                    if (cell.cellId <= 18) left.append(cellHtml);
                    else right.append(cellHtml);
                });
            });
        }

        // 2. РУЧНОЕ ОТКРЫТИЕ/ЗАКРЫТИЕ ПО КЛИКУ
        function toggleCell(id, isClosed) {
            const action = isClosed ? 'open' : 'close';
            $.post(`${API_URL}/cells/${action}/${id}`, () => {
                addLog(`Ручное управление: ячейка ${id} ${isClosed ? 'ОТКРЫТА' : 'ЗАКРЫТА'}`);
                loadCells();
            });
        }

        // 3. ПОИСК ЗАКАЗА
        function findOrder() {
            const id = $('#orderIdInput').val();
            if (!id) {
                addLog("ПРЕДУПРЕЖДЕНИЕ: Введите номер заказа");
                return;
            }

            $.get(`${API_URL}/order/${id}`, function (order) {
                currentOrder = order;
                addLog(`Заказ ${id} найден. Можно переходить к оплате.`);

                $('#order-info-display').html(`
                        <p>ID Заказа: <b>${order.orderId}</b></p>
                        <p>Сумма: <b style="color:#e67e22; font-size:15px;">${order.amount} BYN</b></p>
                        <p>Ячейка: <b>№ ${order.cellId}</b></p>
                        <p>Статус: <b>${order.isPaid ? 'Оплачен' : 'Ожидает оплаты'}</b></p>
                    `);
            }).fail(() => {
                currentOrder = null;
                $('#order-info-display').html('<p style="color:red; text-align:center; margin-top:15px;">Заказ не найден!</p>');
                addLog(`ОШИБКА: Заказ ${id} не найден в базе 1С`);
            });
        }

        // 4. ОПЛАТА ЗАКАЗА (С ПРОВЕРКОЙ)
        function payOrder() {
            if (!currentOrder) {
                alert("Ошибка: Сначала найдите заказ в системе!");
                addLog("ОШИБКА: Попытка оплаты без предварительного поиска");
                return;
            }

            addLog(`Инициация платежа для заказа ${currentOrder.orderId}...`);

            $.post(`${API_URL}/process-payment?orderId=${currentOrder.orderId}`, (res) => {
                addLog(`УСПЕХ: ${res.message}`);
                currentOrder = null; // Сброс
                $('#orderIdInput').val('');
                $('#order-info-display').html('<p style="color:green; text-align:center; margin-top:15px;">Оплата прошла успешно!</p>');
                loadCells();
            }).fail(() => {
                addLog("ОШИБКА: Оплата отклонена сервером");
            });
        }

        $(document).ready(() => {
            loadCells();
            setInterval(loadCells, 15000);
        });
    </script>
</body>
</html>
